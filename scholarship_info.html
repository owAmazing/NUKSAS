<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>獎學金資訊 - ScholarLink</title>
  <script src="auth.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Source+Sans+3:wght@400;600&display=swap');
    :root {
      --bg: #0f172a;
      --card: #111827;
      --surface: #0b1220;
      --accent: #7dd3fc;
      --accent-strong: #22d3ee;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --warn: #f59e0b;
      --success: #22c55e;
      --border: #1f2937;
      --shadow: 0 24px 60px rgba(0,0,0,0.35);
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Source Sans 3', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 20% 20%, rgba(56,189,248,0.06), transparent 25%),
                  radial-gradient(circle at 80% 10%, rgba(14,165,233,0.07), transparent 26%),
                  radial-gradient(circle at 50% 80%, rgba(56,189,248,0.05), transparent 30%),
                  var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
      background: rgba(15,23,42,0.8);
      border-bottom: 1px solid var(--border);
    }
    .nav {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 22px;
    }
    .brand {
      font-weight: 700;
      font-size: 24px;
      color: var(--accent);
      font-family: 'Space Grotesk', sans-serif;
    }
    .nav-menu {
      display: flex;
      gap: 20px;
      align-items: center;
    }
    .nav-link {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
      font-weight: 500;
    }
    .nav-link:hover {
      color: var(--accent);
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .welcome {
      background: var(--card);
      padding: 30px;
      border-radius: var(--radius);
      margin-bottom: 30px;
      border: 1px solid var(--border);
    }
    .welcome h1 {
      margin: 0 0 10px 0;
      color: var(--accent);
    }
    .section {
      background: var(--card);
      padding: 30px;
      border-radius: var(--radius);
      margin-bottom: 30px;
      border: 1px solid var(--border);
    }
    .section h2 {
      margin-top: 0;
      color: var(--text);
      border-bottom: 2px solid var(--border);
      padding-bottom: 10px;
    }
    .scholarship-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .scholarship-card {
      background: var(--surface);
      padding: 20px;
      border-radius: 10px;
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .scholarship-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(125,211,252,0.15);
    }
    .scholarship-card h3 {
      margin-top: 0;
      color: var(--accent);
      font-size: 18px;
    }
    .scholarship-amount {
      font-size: 24px;
      font-weight: 700;
      color: var(--success);
      margin: 10px 0;
    }
    .info-badge {
      display: inline-block;
      padding: 6px 12px;
      background: rgba(125,211,252,0.15);
      color: var(--accent);
      border-radius: 6px;
      font-size: 13px;
      margin-top: 10px;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header>
    <nav class="nav">
      <div class="brand">🎓 ScholarLink</div>
      <div class="nav-menu" id="mainNav" style="display: none;">
        <a href="scholarship_info.html" class="nav-link" onclick="hideNavOnly(event)">獎學金資訊</a>
        <a href="student_profile_apache.html" class="nav-link" onclick="goToPage(event, 'student_profile_apache.html')">個人資料</a>
        <a href="student_dashboard.html" class="nav-link" onclick="goToPage(event, 'student_dashboard.html')">線上申請</a>
        <a href="student_dashboard.html" class="nav-link" onclick="goToPage(event, 'student_dashboard.html#applicationsContent')">申請結果</a>
        <a href="#" class="nav-link" onclick="logout()">登出</a>
      </div>
      <div class="nav-menu" id="backNav" style="display: flex;">
        <a href="student_dashboard.html" class="nav-link">回到首頁</a>
      </div>
    </nav>
  </header>

  <div class="container">
    <div class="welcome">
      <h1>📚 獎學金資訊總覽</h1>
      <p style="color: var(--muted); margin: 0;">查看所有可申請的獎學金項目及詳細資訊</p>
    </div>

    <div class="section">
      <h2>🎯 可申請獎學金列表</h2>
      <div class="scholarship-grid" id="scholarshipGrid">
        <div class="loading">載入中...</div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/scholarship/api/index.php';
    let currentUser = null;

    // 只隱藏導航
    function hideNavOnly(event) {
      event.preventDefault();
      document.getElementById('mainNav').style.display = 'none';
      document.getElementById('backNav').style.display = 'flex';
    }

    // 導向其他頁面
    function goToPage(event, url) {
      event.preventDefault();
      document.getElementById('mainNav').style.display = 'none';
      document.getElementById('backNav').style.display = 'flex';
      window.location.href = url;
    }

    // 頁面載入時檢查權限
    currentUser = checkAuth(['Student']);
    if (!currentUser) {
      throw new Error('Unauthorized');
    }

    // 載入獎學金列表
    async function loadScholarships() {
      try {
        const response = await fetch(`${API_BASE}/scholarships`);
        const result = await response.json();
        
        const grid = document.getElementById('scholarshipGrid');
        
        if (result.success && result.data.length > 0) {
          grid.innerHTML = result.data.map(scholarship => `
            <div class="scholarship-card">
              <h3>${scholarship.name}</h3>
              <div class="scholarship-amount">NT$ ${Number(scholarship.amount).toLocaleString()}</div>
              <p style="color: var(--muted); font-size: 14px; margin: 10px 0;">
                ${scholarship.description || '暫無說明'}
              </p>
              ${scholarship.organizations ? `
                <p style="color: var(--muted); font-size: 13px; margin: 10px 0;">
                  💼 發放機構：${scholarship.organizations}
                </p>
              ` : ''}
              <div class="info-badge">📋 查看詳情</div>
            </div>
          `).join('');
        } else {
          grid.innerHTML = '<p style="color: var(--muted);">目前沒有可申請的獎學金</p>';
        }
      } catch (error) {
        console.error('Error loading scholarships:', error);
        document.getElementById('scholarshipGrid').innerHTML = 
          '<p style="color: #f43f5e;">載入失敗，請確認伺服器已啟動</p>';
      }
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', async () => {
      await loadScholarships();
    });
  </script>
</body>
</html>
