<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>修改基本資料 - ScholarLink</title>
  <script src="auth.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Source+Sans+3:wght@400;600&display=swap');
    :root {
      --bg: #0f172a;
      --card: #111827;
      --surface: #0b1220;
      --accent: #7dd3fc;
      --accent-strong: #22d3ee;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: #1f2937;
      --shadow: 0 24px 60px rgba(0,0,0,0.35);
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Source Sans 3', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 20% 20%, rgba(56,189,248,0.06), transparent 25%),
                  radial-gradient(circle at 80% 10%, rgba(14,165,233,0.07), transparent 26%),
                  radial-gradient(circle at 50% 80%, rgba(56,189,248,0.05), transparent 30%),
                  var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
      background: rgba(15,23,42,0.8);
      border-bottom: 1px solid var(--border);
    }
    .nav {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 22px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      font-family: 'Space Grotesk', sans-serif;
    }
    .brand .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      box-shadow: 0 0 18px rgba(125,211,252,0.6);
    }
    nav a {
      color: var(--muted);
      text-decoration: none;
      margin-left: 18px;
      font-weight: 600;
      transition: color 0.2s ease;
    }
    nav a:hover { color: var(--accent-strong); }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px 22px 60px; }
    .card {
      background: linear-gradient(145deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 18px 20px;
      box-shadow: var(--shadow);
    }
    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .pill {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(125,211,252,0.15);
      color: var(--accent-strong);
      border: 1px solid rgba(125,211,252,0.35);
    }
    .hero {
      margin: 28px 0 10px;
      padding: 26px;
      border-radius: 16px;
      background: linear-gradient(120deg, rgba(14,165,233,0.25), rgba(8,47,73,0.65)),
                  linear-gradient(180deg, rgba(15,23,42,0.9), rgba(15,23,42,0.8));
      border: 1px solid rgba(125,211,252,0.35);
      box-shadow: var(--shadow);
      display: grid;
      gap: 12px;
    }
    .hero h1 { margin: 0; font-size: 28px; letter-spacing: 0.3px; }
    .hero p { margin: 0; color: var(--muted); max-width: 760px; }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; }
    .btn {
      padding: 11px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0.2px;
      transition: all 0.2s ease;
      display: inline-block;
    }
    .btn:hover { border-color: var(--accent-strong); color: var(--accent-strong); }
    .btn.primary { background: linear-gradient(120deg, var(--accent), var(--accent-strong)); color: #0b1220; border: none; box-shadow: 0 12px 40px rgba(34,211,238,0.28); }
    .btn.primary:hover { transform: translateY(-1px); }
    form { display: grid; gap: 12px; }
    label { font-weight: 600; color: var(--text); font-size: 14px; }
    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 14px;
    }
    .split { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 18px; align-items: start; }
    .muted { color: var(--muted); font-size: 13px; }
    footer { margin-top: 40px; color: var(--muted); font-size: 13px; text-align: center; padding: 20px 0 40px; }
    @media (max-width: 720px) {
      .hero h1 { font-size: 24px; }
      nav a { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="nav">
      <div class="brand"><span class="dot"></span>ScholarLink <span style="font-size:14px; color: var(--accent-strong); margin-left:8px;">學生端</span></div>
      <nav>
        <a href="student.html">獎學金資訊</a>
        <a href="student_profile_apache.html">個人資料</a>
        <a href="student_dashboard.html">線上申請</a>
        <a href="student_results.html">申請結果</a>
        <a href="index.html" onclick="logout(); return false;">登出</a>
      </nav>
    </div>
  </header>

  <div class="container">
    <section class="hero">
      <h1>👤 修改基本資料</h1>
      <p>請確保您的個人資料正確無誤，以便順利進行獎助學金申請與審查通知。</p>
    </section>

    <section class="card">
      <div class="section-title">個人資料編輯 <span class="pill">User / Student profile</span></div>
      <div id="loading" style="text-align: center; padding: 40px; color: var(--muted);">
        載入中...
      </div>
      <div id="error" style="display: none; padding: 20px; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 10px; color: #fca5a5; margin-bottom: 20px;">
      </div>
      <div class="split" id="profileForm" style="display: none;">
        <form id="studentForm">
          <div>
            <label>姓名</label>
            <input type="text" id="name" name="name" required>
          </div>
          <div>
            <label>學號</label>
            <input type="text" id="studentId" name="studentId" disabled style="opacity:0.6;">
            <p class="muted">學號無法修改</p>
          </div>
          <div>
            <label>Email</label>
            <input type="email" id="email" name="email" required>
          </div>
          <div>
            <label>聯絡電話（可多筆）</label>
            <input type="text" id="phone1" name="phone1" placeholder="主要電話" required>
            <input type="text" id="phone2" name="phone2" placeholder="次要電話（選填）" style="margin-top:8px;">
          </div>
          <div>
            <label>學生身分別</label>
            <select id="identity" name="identity">
              <option value="一般生">一般生</option>
              <option value="低收入戶">低收入戶</option>
              <option value="身心障礙">身心障礙學生</option>
              <option value="原住民">原住民學生</option>
              <option value="僑生">境外學生（僑生/外籍生）</option>
            </select>
          </div>
          <div>
            <label>主修科系</label>
            <input type="text" id="major" name="major" required>
          </div>
          
          <!-- 僑生額外資訊 -->
          <div id="overseasFields" style="display: none;">
            <hr style="border: 1px solid var(--border); margin: 16px 0;">
            <div style="color: var(--accent-strong); font-weight: 600; margin-bottom: 12px;">僑生資訊</div>
            <div>
              <label>僑生編號</label>
              <input type="text" id="overseas_id" name="overseas_id">
            </div>
            <div>
              <label>華語文能力證明</label>
              <input type="text" id="chinese_certify" name="chinese_certify">
            </div>
            <div>
              <label>入境日期</label>
              <input type="date" id="immigrate_date" name="immigrate_date">
            </div>
            <div>
              <label>護照號碼</label>
              <input type="text" id="passport_number" name="passport_number">
            </div>
          </div>

          <div class="actions">
            <a class="btn" href="student.html">取消</a>
            <button class="btn primary" type="submit">儲存變更</button>
          </div>
        </form>
        <div class="card" style="background: rgba(34,211,238,0.06); border-color: rgba(34,211,238,0.4);">
          <div class="section-title" style="margin-bottom:8px;">個資說明</div>
          <p class="muted">• 姓名、身分證號、Email 與電話將用於申請審核與通知</p>
          <p class="muted">• 身分別需上傳相關證明（如低收證明、身障手冊、僑生居留證等）</p>
          <p class="muted">• 資料變更後請確認申請表是否需同步更新</p>
          <p class="muted">• 學號為系統識別碼，無法自行修改</p>
          <div style="margin-top:12px;">
            <label style="font-size:13px;">上傳身分證明文件</label>
            <input type="file" style="margin-top:6px;">
          </div>
        </div>
      </div>
    </section>
  </div>

  <footer>
    ScholarLink 學生端 © 2026 · <a href="student.html" style="color:var(--accent-strong); text-decoration:none;">返回首頁</a>
  </footer>

  <script>
    // 檢查權限（只允許學生訪問）
    const currentUser = checkAuth(['Student']);
    if (!currentUser) {
      throw new Error('Unauthorized');
    }

    // 設定 API 基礎 URL
    const API_BASE = '/scholarship/api/index.php';
    
    // 使用登入的學生ID
    const CURRENT_STUDENT_ID = currentUser.id;

    // 載入學生資料
    async function loadStudentData() {
      try {
        const response = await fetch(`${API_BASE}/student/${CURRENT_STUDENT_ID}`);
        const result = await response.json();

        if (!result.success) {
          showError('無法載入學生資料：' + result.message);
          return;
        }

        const data = result.data;
        
        // 填充基本資料
        document.getElementById('name').value = data.name || '';
        document.getElementById('studentId').value = data.id || '';
        document.getElementById('email').value = data.email || '';
        document.getElementById('identity').value = data.identity || '一般生';
        document.getElementById('major').value = data.major || '';

        // 填充電話號碼
        const phones = data.phones || [];
        if (phones.length > 0) {
          document.getElementById('phone1').value = phones[0];
        }
        if (phones.length > 1) {
          document.getElementById('phone2').value = phones[1];
        }

        // 根據身分別顯示額外欄位
        toggleIdentityFields(data.identity);

        // 填充僑生資訊
        if (data.identity === '僑生' && data.additionalInfo) {
          const info = data.additionalInfo;
          document.getElementById('overseas_id').value = info.overseas_id || '';
          document.getElementById('chinese_certify').value = info.chinese_certify || '';
          document.getElementById('immigrate_date').value = info.immigrate_date || '';
          document.getElementById('passport_number').value = info.passport_number || '';
        }

        // 顯示表單
        document.getElementById('loading').style.display = 'none';
        document.getElementById('profileForm').style.display = 'grid';

      } catch (error) {
        console.error('載入錯誤:', error);
        showError('載入資料時發生錯誤，請稍後再試');
      }
    }

    // 根據身分別切換顯示欄位
    function toggleIdentityFields(identity) {
      const overseasFields = document.getElementById('overseasFields');
      if (identity === '僑生') {
        overseasFields.style.display = 'block';
      } else {
        overseasFields.style.display = 'none';
      }
    }

    // 身分別改變時切換欄位
    document.addEventListener('DOMContentLoaded', () => {
      const identitySelect = document.getElementById('identity');
      if (identitySelect) {
        identitySelect.addEventListener('change', (e) => {
          toggleIdentityFields(e.target.value);
        });
      }
    });

    // 儲存學生資料
    async function saveStudentData(event) {
      event.preventDefault();

      const formData = new FormData(event.target);
      const phones = [];
      
      if (formData.get('phone1')) phones.push(formData.get('phone1'));
      if (formData.get('phone2')) phones.push(formData.get('phone2'));

      const data = {
        name: formData.get('name'),
        email: formData.get('email'),
        identity: formData.get('identity'),
        major: formData.get('major'),
        phones: phones,
        additionalInfo: null
      };

      // 如果是僑生，加入額外資訊
      if (data.identity === '僑生') {
        data.additionalInfo = {
          overseas_id: formData.get('overseas_id'),
          chinese_certify: formData.get('chinese_certify'),
          immigrate_date: formData.get('immigrate_date'),
          passport_number: formData.get('passport_number')
        };
      }

      try {
        const response = await fetch(`${API_BASE}/student/${CURRENT_STUDENT_ID}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        if (result.success) {
          alert('✅ 資料更新成功！');
          window.location.href = 'student_profile_apache.html';
        } else {
          showError('更新失敗：' + result.message);
        }
      } catch (error) {
        console.error('儲存錯誤:', error);
        showError('儲存時發生錯誤，請稍後再試');
      }
    }

    // 顯示錯誤訊息
    function showError(message) {
      const errorDiv = document.getElementById('error');
      errorDiv.textContent = '❌ ' + message;
      errorDiv.style.display = 'block';
      document.getElementById('loading').style.display = 'none';
    }

    // 頁面載入時執行
    window.addEventListener('DOMContentLoaded', () => {
      loadStudentData();
      
      // 綁定表單提交事件
      const form = document.getElementById('studentForm');
      if (form) {
        form.addEventListener('submit', saveStudentData);
      }
    });
  </script>
</body>
</html>
