<!DOCTYPE html>
<html>
<head>
    <title>Test Upload</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .form-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, button { padding: 8px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>Test File Upload</h1>
    <form id="uploadForm">
        <div class="form-group">
            <label for="studentId">Student ID:</label>
            <input type="text" id="studentId" value="S001" required>
        </div>
        <div class="form-group">
            <label for="file">Select File:</label>
            <input type="file" id="file" accept=".pdf,.jpg,.jpeg,.png" required>
        </div>
        <button type="submit">Upload</button>
    </form>
    
    <div id="result"></div>

    <script>
        const form = document.getElementById('uploadForm');
        const resultDiv = document.getElementById('result');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const studentId = document.getElementById('studentId').value;
            const fileInput = document.getElementById('file');
            const file = fileInput.files[0];

            if (!file) {
                resultDiv.innerHTML = '<p style="color: red;">Please select a file</p>';
                return;
            }

            console.log('Upload details:', {
                student_id: studentId,
                file_name: file.name,
                file_size: file.size,
                file_type: file.type
            });

            const formData = new FormData();
            formData.append('student_id', studentId);
            formData.append('file', file);

            try {
                const response = await fetch('/scholarship/api/identity-proof', {
                    method: 'POST',
                    body: formData
                });

                console.log('Response status:', response.status);
                const result = await response.json();
                console.log('Response data:', result);

                resultDiv.innerHTML = `<pre>${JSON.stringify(result, null, 2)}</pre>`;

                if (result.success) {
                    resultDiv.style.color = 'green';
                    fileInput.value = '';
                } else {
                    resultDiv.style.color = 'red';
                }
            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
