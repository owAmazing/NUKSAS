<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>系統管理員端 - ScholarLink</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Source+Sans+3:wght@400;600&display=swap');
    :root {
      --bg: #0f172a;
      --card: #111827;
      --surface: #0b1220;
      --accent: #7dd3fc;
      --accent-strong: #22d3ee;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: #1f2937;
      --shadow: 0 24px 60px rgba(0,0,0,0.35);
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Source Sans 3', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 20% 20%, rgba(56,189,248,0.06), transparent 25%),
                  radial-gradient(circle at 80% 10%, rgba(14,165,233,0.07), transparent 26%),
                  radial-gradient(circle at 50% 80%, rgba(56,189,248,0.05), transparent 30%),
                  var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
      background: rgba(15,23,42,0.8);
      border-bottom: 1px solid var(--border);
    }
    .nav {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 22px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      font-family: 'Space Grotesk', sans-serif;
    }
    .brand .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      box-shadow: 0 0 18px rgba(125,211,252,0.6);
    }
    nav a {
      color: var(--muted);
      text-decoration: none;
      margin-left: 18px;
      font-weight: 600;
      transition: color 0.2s ease;
    }
    nav a:hover { color: var(--accent-strong); }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px 22px 60px; }
    .grid { display: grid; gap: 18px; }
    .card {
      background: linear-gradient(145deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 18px 20px;
      box-shadow: var(--shadow);
    }
    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .pill {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(125,211,252,0.15);
      color: var(--accent-strong);
      border: 1px solid rgba(125,211,252,0.35);
    }
    .hero {
      margin: 28px 0 10px;
      padding: 26px;
      border-radius: 16px;
      background: linear-gradient(120deg, rgba(14,165,233,0.25), rgba(8,47,73,0.65)),
                  linear-gradient(180deg, rgba(15,23,42,0.9), rgba(15,23,42,0.8));
      border: 1px solid rgba(125,211,252,0.35);
      box-shadow: var(--shadow);
      display: grid;
      gap: 12px;
    }
    .hero h1 { margin: 0; font-size: 28px; letter-spacing: 0.3px; }
    .hero p { margin: 0; color: var(--muted); max-width: 760px; }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; }
    .btn {
      padding: 11px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0.2px;
      transition: all 0.2s ease;
      display: inline-block;
      cursor: pointer;
    }
    .btn:hover { border-color: var(--accent-strong); color: var(--accent-strong); }
    .btn.primary { background: linear-gradient(120deg, var(--accent), var(--accent-strong)); color: #0b1220; border: none; box-shadow: 0 12px 40px rgba(34,211,238,0.28); }
    .btn.primary:hover { transform: translateY(-1px); }
    .btn.danger { background: rgba(244,63,94,0.15); color: #fda4af; border-color: rgba(244,63,94,0.3); }
    .split { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 18px; align-items: start; }
    form { display: grid; gap: 12px; }
    label { font-weight: 600; color: var(--text); font-size: 14px; }
    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 14px;
    }
    textarea { min-height: 110px; resize: vertical; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 12px rgba(125,211,252,0.2); }
    table { width: 100%; border-collapse: collapse; overflow: hidden; border-radius: 12px; }
    th, td { padding: 12px 10px; text-align: left; }
    th { background: rgba(255,255,255,0.04); border-bottom: 1px solid var(--border); font-size: 13px; letter-spacing: 0.3px; }
    tr:nth-child(even) { background: rgba(255,255,255,0.02); }
    tr:hover { background: rgba(34,211,238,0.05); }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      width: fit-content;
    }
    .badge.student { background: rgba(125,211,252,0.2); color: var(--accent); }
    .badge.teacher { background: rgba(34,197,94,0.2); color: #86efac; }
    .badge.organization { background: rgba(168,85,247,0.2); color: #d8b4fe; }
    .badge.admin { background: rgba(244,63,94,0.2); color: #fda4af; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: var(--card); border-radius: var(--radius); padding: 24px; max-width: 500px; width: 90%; box-shadow: var(--shadow); border: 1px solid var(--border); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .modal-header h2 { margin: 0; font-size: 18px; }
    .modal-close { background: none; border: none; color: var(--text); font-size: 24px; cursor: pointer; }
    .success-msg, .error-msg { padding: 10px 12px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; }
    .success-msg { background: rgba(34,197,94,0.2); color: #86efac; }
    .error-msg { background: rgba(244,63,94,0.2); color: #fda4af; }
    .muted { color: var(--muted); font-size: 13px; }
    footer { margin-top: 40px; color: var(--muted); font-size: 13px; text-align: center; padding: 20px 0 40px; }
    /* Toast 通知 */
    .toast {
      position: fixed; bottom: 28px; right: 24px; z-index: 9999;
      padding: 14px 20px; border-radius: 12px; font-size: 14px; font-weight: 600;
      font-family: 'Space Grotesk', sans-serif; box-shadow: 0 8px 32px rgba(0,0,0,0.45);
      display: flex; align-items: center; gap: 10px; max-width: 400px;
      animation: toastIn 0.28s cubic-bezier(.21,1.02,.73,1) forwards;
    }
    .toast.success { background: rgba(34,197,94,0.96); color: #052e16; border: 1px solid rgba(74,222,128,0.5); }
    .toast.error   { background: rgba(239,68,68,0.95);  color: #fff;    border: 1px solid rgba(252,165,165,0.4); }
    @keyframes toastIn  { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes toastOut { from { opacity:1; transform:translateY(0); }   to { opacity:0; transform:translateY(16px); } }
    /* 篩選工具列 */
    .filter-bar { display:flex; flex-wrap:wrap; gap:14px; align-items:center; margin-bottom:16px; }
    .filter-chips { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .filter-chip {
      display:inline-flex; align-items:center; gap:6px; padding:5px 12px;
      border-radius:999px; border:1px solid var(--border); background:var(--surface);
      font-size:13px; font-weight:600; cursor:pointer; transition:all .15s;
      color: var(--muted); user-select:none;
    }
    .filter-chip input[type="checkbox"] { accent-color: var(--accent-strong); width:14px; height:14px; }
    .filter-chip:has(input:checked) { border-color:var(--accent-strong); color:var(--accent-strong); background:rgba(34,211,238,0.08); }
    .filter-search { flex:1; min-width:180px; max-width:300px; }
    .filter-search input { padding:8px 12px; font-size:13px; }
    .filter-count { font-size:12px; color:var(--muted); white-space:nowrap; }
    @media (max-width: 720px) {
      .hero h1 { font-size: 24px; }
      nav a { display: none; }
      .split { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="nav">
      <div class="brand"><span class="dot"></span>ScholarLink <span style="font-size:14px; color: var(--accent-strong); margin-left:8px;">系統管理員</span></div>
      <nav>
        <a href="admin_scholarships.html">獎助管理</a>
        <a href="admin_announcements.html">公告管理</a>
        <a href="admin_identity_proof.html">佐證檔案管理</a>
        <a href="admin_accounts.html">帳號管理</a>
        <a href="admin_messages.html">留言審查</a>
        <a href="admin_memos.html">備忘錄</a>
        <a href="/scholarship/pages/login.html" onclick="logout();return false;">登出</a>
      </nav>
    </div>
  </header>

  <div class="container">
    <section class="hero">
      <h1>👥 帳號與權限管理</h1>
      <p>管理系統使用者帳號、角色與權限設定。</p>
    </section>

    <!-- 新增帳號表單 -->
    <section id="add-account-form" class="card">
      <div class="section-title">新增帳號 <span class="pill">Create new account</span></div>
      <div id="form-msg"></div>
      <form id="accountForm">
        <div class="split">
          <div>
            <label for="accountId">帳號 ID *</label>
            <input type="text" id="accountId" name="id" placeholder="例：S001、T001、ORG001" required>
            <p class="muted">系統內唯一識別，建立後無法修改</p>
          </div>
          <div>
            <label for="accountName">姓名 *</label>
            <input type="text" id="accountName" name="name" placeholder="填入使用者姓名" required>
          </div>
        </div>
        <div class="split">
          <div>
            <label for="accountEmail">Email *</label>
            <input type="email" id="accountEmail" name="email"
              placeholder="例：user@nuk.edu.tw、test@example.com"
              required>
          </div>
          <div>
            <label for="accountType">角色 *</label>
            <select id="accountType" name="type" required onchange="onTypeChange()">
              <option value="">請選擇角色</option>
              <option value="Student">學生 (Student)</option>
              <option value="Teacher">教師 (Teacher)</option>
              <option value="Organization">審查單位 (Organization)</option>
              <option value="SystemAdministrator">系統管理員 (Admin)</option>
            </select>
          </div>
        </div>
        <!-- 密碼欄位 -->
        <div class="split">
          <div>
            <label for="accountPassword">預設密碼 *</label>
            <input type="password" id="accountPassword" name="password" placeholder="設定初始登入密碼（至少 6 字）" minlength="6" required>
            <p class="muted">使用者首次登入密碼，建議完成啟用後立即修改</p>
          </div>
          <div>
            <label for="accountPasswordConfirm">確認密碼 *</label>
            <input type="password" id="accountPasswordConfirm" name="passwordConfirm" placeholder="再次輸入密碼" minlength="6" required>
          </div>
        </div>
        <!-- 科系選單：僅學生與教師顯示 -->
        <div id="departmentGroup" style="display:none;">
          <label for="accountDepartment">所屬科系 *</label>
          <select id="accountDepartment" name="department">
            <option value="">請選擇所屬科系</option>
            <option value="西洋語文學系">西洋語文學系</option>
            <option value="運動健康與休閒學系">運動健康與休閒學系</option>
            <option value="工藝與創意設計學系">工藝與創意設計學系</option>
            <option value="東亞語文學系">東亞語文學系</option>
            <option value="運動競技學系">運動競技學系</option>
            <option value="建築學系">建築學系</option>
            <option value="法律學系">法律學系</option>
            <option value="政治法律學系">政治法律學系</option>
            <option value="財經法律學系">財經法律學系</option>
            <option value="法學院博士班">法學院博士班</option>
            <option value="應用數學系">應用數學系</option>
            <option value="生命科學系">生命科學系</option>
            <option value="應用物理學系">應用物理學系</option>
            <option value="應用化學系">應用化學系</option>
            <option value="統計學研究所">統計學研究所</option>
            <option value="應用經濟學系">應用經濟學系</option>
            <option value="亞太工商管理學系">亞太工商管理學系</option>
            <option value="財務金融學系">財務金融學系</option>
            <option value="資訊管理學系">資訊管理學系</option>
            <option value="電機工程學系">電機工程學系</option>
            <option value="土木與環境工程學系">土木與環境工程學系</option>
            <option value="資訊工程學系">資訊工程學系</option>
            <option value="化學工程及材料工程學系">化學工程及材料工程學系</option>
          </select>
          <p class="muted">學生與教師必須選擇所屬科系，以啟用科系隔離功能</p>
        </div>
        <div class="actions" style="margin-top: 12px;">
          <button class="btn primary" type="submit">新增帳號</button>
          <button class="btn" type="reset" onclick="onFormReset()">清除</button>
        </div>
      </form>
    </section>

    <!-- 帳號列表 -->
    <section id="accounts-list" class="card">
      <div class="section-title">現有帳號列表 <span class="pill">System accounts</span></div>
      <div id="list-msg"></div>

      <!-- 篩選工具列 -->
      <div class="filter-bar">
        <div class="filter-chips">
          <span style="font-size:13px;font-weight:600;color:var(--muted);white-space:nowrap;">身分篩選：</span>
          <label class="filter-chip"><input type="checkbox" value="Student" checked onchange="applyFilter()"> 學生</label>
          <label class="filter-chip"><input type="checkbox" value="Teacher" checked onchange="applyFilter()"> 教師</label>
          <label class="filter-chip"><input type="checkbox" value="Organization" checked onchange="applyFilter()"> 審查單位</label>
          <label class="filter-chip"><input type="checkbox" value="SystemAdministrator" checked onchange="applyFilter()"> 管理員</label>
        </div>
        <div class="filter-search">
          <input type="text" id="searchInput" placeholder="搜尋 ID 或姓名…" oninput="applyFilter()" style="width:100%;">
        </div>
        <span id="filterCount" class="filter-count"></span>
      </div>

      <div style="overflow-x:auto;">
        <table id="accountsTable">
          <thead>
            <tr>
              <th>帳號 ID</th>
              <th>姓名</th>
              <th>角色</th>
              <th>科系</th>
              <th>Email</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="6" style="text-align:center; color: var(--muted);">載入中...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <footer>
    ScholarLink 系統管理員端 © 2026 · <a href="/scholarship/pages/login.html" style="color:var(--accent-strong); text-decoration:none;">返回登入頁</a>
  </footer>

  <script src="auth.js"></script>
  <script>
    const API_BASE = `/scholarship/api`;

    // ── 角色變更：動態顯示/隱藏科系欄位 ───────────────────────
    function onTypeChange() {
      const type      = document.getElementById('accountType').value;
      const needsDept = ['Student', 'Teacher'].includes(type);
      const group     = document.getElementById('departmentGroup');
      const select    = document.getElementById('accountDepartment');
      group.style.display  = needsDept ? 'block' : 'none';
      select.required      = needsDept;
      if (!needsDept) select.value = '';
    }

    // ── 清除按鈕同步隱藏科系欄位 ───────────────────────────────
    function onFormReset() {
      document.getElementById('departmentGroup').style.display = 'none';
      document.getElementById('accountDepartment').required    = false;
      document.getElementById('accountDepartment').value       = '';
      document.getElementById('accountPassword').value         = '';
      document.getElementById('accountPasswordConfirm').value  = '';
      document.getElementById('form-msg').innerHTML            = '';
    }

    // ── Toast 通知 ─────────────────────────────────────────────
    function showToast(message, type = 'success', duration = 3800) {
      const old = document.getElementById('_toast');
      if (old) old.remove();
      const el = document.createElement('div');
      el.id = '_toast';
      el.className = `toast ${type}`;
      el.textContent = message;
      document.body.appendChild(el);
      setTimeout(() => {
        el.style.animation = 'toastOut 0.28s ease forwards';
        setTimeout(() => el.remove(), 280);
      }, duration);
    }

    // ── 全域帳號快取 ───────────────────────────────────────────
    let allUsers = [];

    // ── 篩選 + 搜尋聯動邏輯 ────────────────────────────────────
    function applyFilter() {
      const checked = Array.from(
        document.querySelectorAll('.filter-chips input[type="checkbox"]:checked')
      ).map(cb => cb.value);
      const kw = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();

      const filtered = allUsers.filter(u => {
        const roleOk = checked.includes(u.type);
        const kwOk   = !kw || u.id.toLowerCase().includes(kw) || u.name.toLowerCase().includes(kw);
        return roleOk && kwOk;
      });

      renderTable(filtered);
      const countEl = document.getElementById('filterCount');
      if (countEl) countEl.textContent = `顯示 ${filtered.length} / ${allUsers.length} 筆`;
    }

    // ── 渲染表格 ───────────────────────────────────────────────
    const ROLE_LABEL  = { Student:'學生', Teacher:'教師', Organization:'審查單位', SystemAdministrator:'系統管理員' };
    const ROLE_BADGE  = { Student:'student', Teacher:'teacher', Organization:'organization', SystemAdministrator:'admin' };

    function renderTable(users) {
      const tbody = document.getElementById('tableBody');
      if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color: var(--muted); padding:20px;">無符合條件的帳號</td></tr>';
        return;
      }
      tbody.innerHTML = users.map(u => `
        <tr>
          <td><strong>${u.id}</strong></td>
          <td>${u.name}</td>
          <td><span class="badge ${ROLE_BADGE[u.type] || 'student'}">${ROLE_LABEL[u.type] || u.type}</span></td>
          <td><small style="color:var(--muted);">${u.department || '—'}</small></td>
          <td><small>${u.email}</small></td>
          <td>
            <button class="btn danger" style="padding:6px 10px; font-size:12px;"
              onclick="deleteAccount('${u.id}')">刪除</button>
          </td>
        </tr>
      `).join('');
    }

    // ── 新增帳號 ───────────────────────────────────────────────
    document.getElementById('accountForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msgDiv = document.getElementById('form-msg');
      msgDiv.innerHTML = '';

      const id              = document.getElementById('accountId').value.trim();
      const name            = document.getElementById('accountName').value.trim();
      const email           = document.getElementById('accountEmail').value.trim();
      const type            = document.getElementById('accountType').value;
      const password        = document.getElementById('accountPassword').value;
      const passwordConfirm = document.getElementById('accountPasswordConfirm').value;
      const department      = ['Student', 'Teacher'].includes(type)
        ? document.getElementById('accountDepartment').value : null;

      if (password.length < 6) {
        msgDiv.innerHTML = `<div class="error-msg">❌ 密碼至少需要 6 個字元</div>`; return;
      }
      if (password !== passwordConfirm) {
        msgDiv.innerHTML = `<div class="error-msg">❌ 兩次輸入的密碼不一致</div>`; return;
      }
      if (['Student', 'Teacher'].includes(type) && !department) {
        msgDiv.innerHTML = `<div class="error-msg">❌ 請選擇所屬科系</div>`; return;
      }
      if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) {
        msgDiv.innerHTML = `<div class="error-msg">❌ Email 格式不正確</div>`; return;
      }

      const submitBtn = e.target.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = '新增中…';

      try {
        const response = await fetch(`${API_BASE}/user`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, name, email, type, department, password })
        });
        const data = await response.json();

        if (!response.ok || !data.success) {
          msgDiv.innerHTML = `<div class="error-msg">❌ ${data.message || '新增失敗'}</div>`;
        } else {
          const deptText = data.data?.department ? `　科系：${data.data.department}` : '';
          const pwText   = data.data?.tempPassword ? `　初始密碼：${data.data.tempPassword}` : '';
          showToast(`✓ 帳號 ${id} 新增成功${pwText}${deptText}`);
          msgDiv.innerHTML = '';
          document.getElementById('accountForm').reset();
          onFormReset();
          await loadAccounts();
        }
      } catch (err) {
        msgDiv.innerHTML = `<div class="error-msg">❌ ${err.message}</div>`;
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '新增帳號';
      }
    });

    // ── 載入帳號列表 ───────────────────────────────────────────
    async function loadAccounts() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:16px;">載入中…</td></tr>';
      try {
        const response = await fetch(`${API_BASE}/users`);
        const data = await response.json();
        if (!response.ok || !data.users) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--muted);">無法載入帳號</td></tr>';
          return;
        }
        allUsers = data.users;
        applyFilter();
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="6" style="color:var(--text);">❌ ${err.message}</td></tr>`;
      }
    }

    // ── 刪除帳號 ───────────────────────────────────────────────
    function deleteAccount(userId) {
      if (!confirm(`確定要刪除帳號 ${userId} 嗎？此動作無法復原。`)) return;
      fetch(`${API_BASE}/user/${userId}`, { method: 'DELETE' })
        .then(r => r.json())
        .then(data => {
          if (data.success) { showToast(`帳號 ${userId} 已刪除`); loadAccounts(); }
          else showToast(`刪除失敗：${data.message}`, 'error');
        })
        .catch(err => showToast(`錯誤：${err.message}`, 'error'));
    }

    // 頁面載入時取得帳號列表
    window.addEventListener('load', loadAccounts);
  </script>
</body>
</html>
